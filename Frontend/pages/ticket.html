<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" href="../assets/images/icons/estrella.ico" type="image/x-icon">

    <title>TAKANA - Comprobante</title>

<body>

    <main>

            <div class="resumen-ticket">
                    <p id="total-ticket">Total: $0</p>
                </div>

            <div class="botones-ticket">
                <button class="btn-secundario" id="btn-descargar-pdf">Descargar PDF</button>
