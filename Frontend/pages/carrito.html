<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="icon" href="../assets/images/icons/estrella.ico" type="image/x-icon">
    <title>TAKANA - Carrito</title>
</head>
<body>
    <header>
        <img id="logo-header" src="../assets/images/logo/takana.png" alt="Logo TAKANA DRINKS">
        <nav id="lista-opciones">
            <ul>
                <a href="../index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="carrito.html">Carrito</a>
            </ul>
        </nav>
        <button class="btn-terciario btn-admin" onclick="window.location.href='/* RUTA LOCAL HOST */'">Admin</button>
    </header>

    <main>
        <section class = "carrito">
            <h2 class="titulo-carrito">Carrito de compras</h2>

            <div id="contenedor-carrito">
                <ul id="lista-carrito"></ul>
            </div>

            <div class="resumen-carrito">
                <p id="total">Total: $0</p>
            </div>

            <div class="botones-carrito">
                <button class="btn-secundario" id="btn-seguir-comprando">Seguir comprando</button>
                <button class="btn-primario" id="btn-finalizar-compra">Finalizar compra</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 TAKANA DRINKS. Todos los derechos reservados.</p>
    </footer>
    <script type="module" src="../Js/pages/carrito.js"></script>

    <div id="modal-confirmacion" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3>¿Confirmas tu compra?</h3>
            <div class="modal-botones">
                <button class="btn-primario" id="btn-confirmar-modal">Confirmar</button>
                <button class="btn-secundario" id="btn-cancelar-modal">Cancelar</button>
            </div>
        </div>
    </div>
    <div id="modal-vacio" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <h3>Debes agregar productos para continuar</h3>
            <div class="modal-botones">
                <button class="btn-primario" id="btn-aceptar-modal">Aceptar</button>
            </div>
        </div>
    </div>
</body>

</html>
